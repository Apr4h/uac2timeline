services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./uploads:/uploads
    environment:
      DB_PATH: /data/uac.db
      UPLOAD_DIR: /uploads
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    command: celery -A backend.app.tasks.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./data:/data
      - ./uploads:/uploads
    environment:
      DB_PATH: /data/uac.db
      UPLOAD_DIR: /uploads
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "5173:80"
